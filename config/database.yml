default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host: db
  username: postgres
  password: password
  port: 5432
  database: graduation_development_development

test:
  <<: *default
  host: db
  username: postgres
  password: password
  port: 5432
  database: graduation_development_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>